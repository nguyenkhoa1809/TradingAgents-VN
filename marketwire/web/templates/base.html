<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ title }}</title>
<style>
  :root { --bg:#fafafa; --card:#fff; --ink:#111; --muted:#666; --accent:#0a5; --border:#e5e5e5; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0e0e10; --card:#17171a; --ink:#eee; --muted:#999; --accent:#4ade80; --border:#27272a; }
  }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:var(--bg); color:var(--ink); }
  header { padding:16px 24px; border-bottom:1px solid var(--border); background:var(--card); position:sticky; top:0; z-index:10; }
  header h1 { margin:0; font-size:18px; display:inline-block; }
  nav { display:inline-block; margin-left:24px; }
  nav a { margin-right:16px; color:var(--muted); text-decoration:none; font-size:14px; }
  nav a.active, nav a:hover { color:var(--accent); }
  main { max-width:900px; margin:0 auto; padding:24px; }
  .article { background:var(--card); border:1px solid var(--border); border-radius:8px;
             padding:16px; margin-bottom:12px; }
  .article.hit { border-left:4px solid var(--accent); }
  .hit-badge { background:var(--accent); color:#fff; padding:2px 8px; border-radius:10px; font-weight:600; font-size:11px; }
  .article h2 { margin:0 0 6px; font-size:17px; line-height:1.35; }
  .article h2 a { color:var(--ink); text-decoration:none; }
  .article h2 a:hover { color:var(--accent); }
  .meta { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .meta .imp { color:var(--accent); font-weight:600; }
  .summary { margin:8px 0; }
  .summary.en { color:var(--muted); font-size:13px; }
  .thesis { font-style:italic; color:var(--ink); border-left:3px solid var(--accent); padding-left:10px; margin:10px 0; }
  .tags { margin-top:8px; }
  .tag { display:inline-block; padding:2px 8px; margin:2px 4px 2px 0; border-radius:10px;
         background:var(--border); font-size:11px; color:var(--muted); }
  .tag.ticker { background:var(--accent); color:#fff; font-weight:600; }

  /* Prose content (blog posts) — tái dùng biến màu hiện có, không tạo palette mới */
  .blog-content { line-height:1.7; }
  .blog-content h1, .blog-content h2, .blog-content h3 { color:var(--ink); margin:24px 0 10px; }
  .blog-content h1 { font-size:22px; }
  .blog-content h2 { font-size:19px; }
  .blog-content h3 { font-size:16px; }
  .blog-content p { margin:12px 0; }
  .blog-content a { color:var(--accent); }
  .blog-content ul, .blog-content ol { padding-left:22px; }
  .blog-content li { margin:4px 0; }
  .blog-content code { background:var(--border); padding:1px 5px; border-radius:4px; font-size:13px; }
  .blog-content pre { background:var(--border); padding:12px; border-radius:8px; overflow-x:auto; }
  .blog-content pre code { background:none; padding:0; }
  .blog-content blockquote { border-left:3px solid var(--accent); margin:12px 0; padding-left:12px; color:var(--muted); }
  .blog-content table { border-collapse:collapse; width:100%; margin:12px 0; }
  .blog-content th, .blog-content td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
</style>
</head>
<body>
<header>
  <h1>📈 MarketWire</h1>
  <nav>
    <a href="{{ nav_prefix|default('') }}briefing.html" class="{% if nav_active=='briefing' %}active{% endif %}">🌅 Briefing</a>
    <a href="{{ nav_prefix|default('') }}index.html" class="{% if nav_active=='index' %}active{% endif %}">Mới nhất</a>
    <a href="{{ nav_prefix|default('') }}important.html" class="{% if nav_active=='important' %}active{% endif %}">★4+</a>
    <a href="{{ nav_prefix|default('') }}portfolio.html" class="{% if nav_active=='portfolio' %}active{% endif %}">Universe</a>
    <a href="{{ nav_prefix|default('') }}blog/index.html" class="{% if nav_active=='blog' %}active{% endif %}">📝 Blog</a>
  </nav>
</header>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
