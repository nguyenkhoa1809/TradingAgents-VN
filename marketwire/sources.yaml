# MarketWire sources. Thêm/bớt feed ở đây, chạy seed_sources.py để sync vào DB.
# Lưu ý: một số trang chặn RSS, cần dùng substack export hoặc scrape riêng.

# LLM config — swap provider tại đây.
llm:
  default:
    provider: deepseek          # bulk summarize: rẻ ~$1.6/tháng
    model: deepseek-v4-flash
  rerank:                       # re-rank top bài quan trọng
    provider: deepseek          # flash: ổn định hơn pro cho single-turn JSON task
    model: deepseek-v4-flash
    enabled: true               # hybrid: Flash bulk + Flash rerank (pro không ổn định với max_tokens nhỏ)

