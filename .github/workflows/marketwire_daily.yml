name: MarketWire Daily

on:
  schedule:
    # TEST TẠM #2 — 7:12 UTC hôm nay, verify sau khi chuyển repo sang Public.
    # Đổi lại '15 1 * * 1-6' (08:15 ICT) ngay sau khi confirm xong.
    - cron: '12 7 * * *'
  workflow_dispatch:          # trigger thủ công

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          # requirements.txt nằm trong marketwire/, không phải repo root —
          # chỉ định rõ để cache key tính đúng.
          cache-dependency-path: marketwire/requirements.txt

      - name: Install dependencies
        working-directory: marketwire
        run: pip install -r requirements.txt

      - name: Download DB from R2
        working-directory: marketwire
        run: python scripts/db_sync.py download
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Install Playwright browsers
        # crawl4ai (requirements.txt) cần Chromium thật cho các nguồn kind: scrape
        # (vd SBV — không có RSS, phải scrape trang JS-rendered). pip install chỉ
        # cài package Python, không tự tải browser binary — thiếu bước này thì
        # mọi nguồn scrape sẽ fail trên runner sạch (ubuntu-latest không có sẵn).
        working-directory: marketwire
        run: python -m playwright install chromium --with-deps

      - name: Run MarketWire pipeline
        working-directory: marketwire
        run: python scripts/run_daily.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload DB to R2
        if: always()  # upload kể cả khi pipeline partial fail — không mất data đã fetch
        working-directory: marketwire
        run: python scripts/db_sync.py upload
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Deploy web to Cloudflare Pages
        if: success()  # chỉ deploy khi KHÔNG có step nào trước đó fail (vd migrate.py — bước critical duy nhất)
        working-directory: marketwire
        run: npx wrangler pages deploy web/dist --project-name=marketwire
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # token chỉ scope Pages:Edit nên wrangler không tự list được account —
          # phải truyền thẳng account_id, dùng chung R2_ACCOUNT_ID (cùng 1 Cloudflare account)
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
